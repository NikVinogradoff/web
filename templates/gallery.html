{% extends "base.html" %}

{% block content %}
<div class="container" style="width: 60%">
    <h1 class="text-center">Пейзажи Марса</h1>
    <div class="row">
        <div class="col">
            <div id="carouselExampleIndicators" class="carousel slide">
                <div class="carousel-indicators">
                    {% for file in files %}
                    {% if loop.index == 1 %}
                    <button type="button" data-bs-target="#carouselExampleIndicators"
                            data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    {% else %}
                    <button type="button" data-bs-target="#carouselExampleIndicators"
                            data-bs-slide-to="{{ loop.index0 }}" aria-label="Slide {{ loop.index }}"></button>
                    {% endif %}
                    {% endfor %}
                </div>
                <div class="carousel-inner">
                    {% for file in files %}
                    {% if loop.index == 1 %}
                    <div class="carousel-item active">
                        <img src="{{ url_for('static', filename=file) }}" class="d-block w-100"
                             alt="{{ url_for('static', filename=file) }}">
                    </div>
                    {% else %}
                    <div class="carousel-item">
                        <img src="{{ url_for('static', filename=file) }}" class="d-block w-100"
                             alt="{{ url_for('static', filename=file) }}">
                    </div>
                    {% endif %}
                    {% endfor %}
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col">
            <form method="post" enctype="multipart/form-data">
                <div class="mt-3 mb-3">
                    <h6>Добавить картинку</h6>
                </div>
                <div class="form-group mb-3">
                    <input type="file" class="form-control-file" id="photo" name="file">
                </div>
                <button type="submit" class="btn btn-success">Отправить</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
