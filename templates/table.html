{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="text-center mb-3">Оформление каюты</h2>
    <div class="row">
        <div class="col">
            <table class="table table-sm">
                <thead>
                    <tr class="table-secondary">
                        <td scope="col" class="text-center">Цвет стен</td>
                        <td scope="col" class="text-center">Эмблема</td>
                    </tr>
                </thead>
                <thead>
                    <tr>
                        {% if age >= 18 and sex == 'male' %}
                        <td class="table table-primary table-active"></td>
                        <td scope="col" class="text-center"><img
                                src="{{ url_for('static', filename='images/marsohod.jpg') }}"
                                alt="{{ url_for('static', filename='images/marsohod.jpg') }}"></td>
                        {% elif age >= 18 %}
                        <td class="table table-danger table-active"></td>
                        <td scope="col" class="text-center"><img
                                src="{{ url_for('static', filename='images/marsohod.jpg') }}"
                                alt="{{ url_for('static', filename='images/marsohod.jpg') }}"></td>
                        {% elif sex == 'male' %}
                        <td class="table table-info table-active"></td>
                        <td scope="col" class="text-center"><img
                                src="{{ url_for('static', filename='images/mars_chocolate.jpg') }}"
                                alt="{{ url_for('static', filename='images/mars_chocolate.jpg') }}"></td>
                        {% else %}
                        <td class="table table-warning table-active"></td>
                        <td scope="col" class="text-center"><img
                                src="{{ url_for('static', filename='images/mars_chocolate.jpg') }}"
                                alt="{{ url_for('static', filename='images/mars_chocolate.jpg') }}"></td>
                        {% endif %}
                    </tr>
                </thead>
            </table>
        </div>
    </div>
</div>
{% endblock %}
